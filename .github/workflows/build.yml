name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ensure unzip is available
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip project archive
        run: |
          unzip -o android-llm-app.zip -d extracted

      - name: List extracted files
        run: ls -la extracted

      - name: Make gradlew executable
        run: |
          if [ -f extracted/gradlew ]; then chmod +x extracted/gradlew; fi

      - name: Build with Gradle
        run: |
          cd extracted
          if [ -f gradlew ]; then ./gradlew assembleDebug --no-daemon; else echo "gradlew not found"; exit 1; fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: extracted/app/build/outputs/apk/debug/app-debug.apk
