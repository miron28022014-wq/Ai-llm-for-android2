name: Build wrapper-app debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: '33'
        build-tools: '33.0.2'

    - name: Install Gradle (for wrapper generation)
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle

    - name: Generate Gradle wrapper
      working-directory: wrapper-app
      run: gradle wrapper --gradle-version 8.4

    - name: Build debug APK
      working-directory: wrapper-app
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wrapper-app-debug-apk
        path: wrapper-app/app/build/outputs/apk/debug/app-debug.apk
