name: Build wrapper-app debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android command-line tools and SDK components
      env:
        ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
        PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:${{ github.workspace }}/android-sdk/platform-tools:${{ env.PATH }}
      run: |
        set -e
        mkdir -p "$ANDROID_SDK_ROOT"
        cd /tmp
        echo "Downloading Android command-line tools..."
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
        mv cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
        export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses
        sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    - name: Install Gradle
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle unzip

    - name: Generate Gradle wrapper
      working-directory: wrapper-app
      run: gradle wrapper --gradle-version 8.4

    - name: Build debug APK
      working-directory: wrapper-app
      env:
        ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
        PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:${{ github.workspace }}/android-sdk/platform-tools:${{ env.PATH }}
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wrapper-app-debug-apk
        path: wrapper-app/app/build/outputs/apk/debug/app-debug.apk
