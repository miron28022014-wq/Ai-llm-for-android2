name: Build app debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android command-line tools and SDK components
      env:
        ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      run: |
        set -e
        mkdir -p "$ANDROID_SDK_ROOT"
        cd /tmp
        echo "Downloading Android command-line tools..."
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
        mv cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
        export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses
        sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget

    - name: Install Gradle 8.4
      run: |
        cd /tmp
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
        unzip -q gradle.zip -d /tmp
        echo "GRADLE_HOME=/tmp/gradle-8.4" >> $GITHUB_ENV
        echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Build debug APK
      working-directory: app
      env:
        ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      run: |
        export PATH="/tmp/gradle-8.4/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        gradle assembleDebug --no-daemon

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
